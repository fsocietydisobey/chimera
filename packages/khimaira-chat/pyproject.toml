[project]
# Distribution name (PyPI): `khimaira-chat`. Local module path stays
# as `khimaira_chat` (src/khimaira_chat/, `from khimaira_chat import ...`).
name = "khimaira-chat"
version = "0.1.0"
description = "Cross-session real-time chat MCP server for Claude Code — channels-based daemon push, sub-2s latency, group + handshake. Part of the khimaira workspace."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "fsocietydisobey" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
keywords = ["khimaira", "chat", "mcp", "claude-code", "channels", "real-time"]
dependencies = [
    "mcp[cli]>=1.0",
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://github.com/fsocietydisobey/khimaira"
Repository = "https://github.com/fsocietydisobey/khimaira"
Issues = "https://github.com/fsocietydisobey/khimaira/issues"

[project.scripts]
# Binary name `khimaira-chat` matches the distribution name (no
# pre-existing CLI to maintain back-compat with). Invoked by Claude
# Code as a stdio MCP subprocess via the bootstrap-installed
# `claude mcp add` entry.
khimaira-chat = "khimaira_chat.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/khimaira_chat"]
