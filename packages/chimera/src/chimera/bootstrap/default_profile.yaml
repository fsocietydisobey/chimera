# Default chimera profile — applied when no --profile is passed and no
# CHIMERA_PROFILE / ~/.config/chimera/profile.yaml exists.
#
# Minimal: registers chimera's own MCP server + installs the supervisor.
# No dotfiles, no sibling repos. Devs with their own setup author a
# profile in their dotfiles repo and pass --profile or set CHIMERA_PROFILE.

name: chimera-default
description: |
  Chimera-only baseline. Installs the chimera-monitor daemon as a
  host-native supervised service and registers mcp__chimera__* with
  Claude Code. No personal config, no sibling MCP servers.

# chimera-monitor needs the SPA built so the web dashboard works.
# Cheap-ish (~4s npm build) and the daemon is supervised so it survives
# a missing build by serving JSON API only — but the dashboard is part
# of the value, so build by default.
spa_build: true

supervisor:
  # Installs systemd user unit (Linux) / launchd LaunchAgent (macOS).
  # No-op on other platforms; chimera doctor will nudge toward `watch`.
  auto_install: true

mcp_servers:
  - name: chimera
    # bash -lc so the user's PATH (uv, etc.) is in scope; 2>>log so a
    # crashed launch leaves a breadcrumb the user can find via doctor.
    command: bash -lc 'uv --directory ~/dev/chimera run chimera mcp 2>>/tmp/chimera.log'

# No repos block: the default assumes chimera itself is already cloned
# (bootstrap is being run from inside it). Profiles that want sibling
# MCP servers (seance/specter/scarlet/etc.) declare them under `repos`
# AND `mcp_servers` in their own manifest.
