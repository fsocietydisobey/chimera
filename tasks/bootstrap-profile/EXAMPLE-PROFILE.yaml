# Example khimaira profile — derived from the current laptop's setup.
# Drop this into your dotfiles repo as `khimaira-profile.yaml`, then:
#
#   khimaira bootstrap --profile https://raw.githubusercontent.com/<you>/dotfiles/main/khimaira-profile.yaml
#
# Or, after dotfiles are cloned:
#
#   khimaira bootstrap --profile ~/dotfiles/khimaira-profile.yaml
#
# Re-run `khimaira sync` on any machine to pick up profile changes
# (new symlinks, new MCP servers, etc.). Idempotent — safe on a cron.

name: fsocietydisobey
description: |
  Joseph's portable agent setup. Clones dotfiles, symlinks Claude
  rules/commands/agents, registers khimaira's unified MCP server
  (which now exposes seance/specter/scarlet tools under the same
  connection — see NORTH_STAR Phase 0), plus the Linear MCP for
  task surfacing. Installs the supervisor.

dotfiles:
  repo: git@github.com:fsocietydisobey/dotfiles.git
  path: ~/dotfiles
  symlinks:
    - { src: claude/CLAUDE.md, dest: ~/.claude/CLAUDE.md }
    - { src: claude/rules,     dest: ~/.claude/rules }
    - { src: claude/commands,  dest: ~/.claude/commands }
    - { src: claude/agents,    dest: ~/.claude/agents }
    # Add cursor symlinks here if/when you sync those too:
    # - { src: cursor/rules, dest: ~/.cursor/rules }

repos:
  - name: khimaira
    url: git@github.com:fsocietydisobey/khimaira.git
    # `--all-packages` is load-bearing: khimaira is a uv workspace and a
    # plain `uv sync` only installs the root project's deps, which drops
    # member-package entry-point scripts (notably `.venv/bin/khimaira`).
    install: uv sync --all-packages
  # Phase 0 consolidation: seance/specter/scarlet source now lives at
  # packages/{seance,specter,scarlet}/ inside khimaira. The legacy
  # standalone repos at fsocietydisobey/{seance,specter,scarlet} are
  # archived; their tools are exposed through khimaira's MCP under the
  # source-prefixed names (mcp__khimaira__seance_*, specter_*, scarlet_*).
  # No separate clone or `*_serve` MCP registration needed.
  - name: ai-orchestrator
    url: git@github.com:fsocietydisobey/ai-orchestrator.git
    install: uv sync

mcp_servers:
  - name: khimaira
    # `python -m khimaira.cli mcp` (not bare `khimaira mcp`) survives the
    # workspace-sync churn that can drop .venv/bin/khimaira. This single
    # MCP entry surfaces khimaira native tools AND the seance/specter/
    # scarlet tools (re-registered under prefixed names at boot).
    command: uv --directory ~/dev/khimaira run python -m khimaira.cli mcp 2>>/tmp/khimaira.log
  - name: ai-orchestrator
    command: uv --directory ~/dev/ai-orchestrator run ai-orchestrator 2>>/tmp/orchestrator.log
  - name: linear
    command: npx -y mcp-remote https://mcp.linear.app/mcp

supervisor:
  auto_install: true

spa_build: true

# Re-write ~/.claude/settings.json with khimaira's hooks on every
# bootstrap/sync. Lives outside dotfiles symlinks because hook command
# paths embed the local khimaira install path — symlinking from a
# fixed-path dotfiles copy would write wrong paths on machines whose
# username or install location differs.
install_claude_hooks: true
